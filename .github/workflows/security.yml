name: Security

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Compile application for analysis
        run: |
          find src/main/java -name '*.java' -print | sort > main-sources.txt
          mkdir -p build/main
          javac --release 21 -encoding UTF-8 -Xlint:all -d build/main @main-sources.txt

      - name: Analyze Java
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: /language:java-kotlin

  image-scan:
    name: Container image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build runtime image
        run: docker build --target runtime -t trap21:scan .

      - name: Scan image and produce SARIF
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: trap21:scan
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          vuln-type: os,library
          exit-code: "0"

      - name: Upload Trivy findings
        if: always()
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: trap21:scan
          format: cyclonedx
          output: trap21-sbom.cdx.json
          vuln-type: os,library

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trap21-sbom
          path: trap21-sbom.cdx.json
          if-no-files-found: error
          retention-days: 30

      - name: Fail on high or critical vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: trap21:scan
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          vuln-type: os,library
          exit-code: "1"
