name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Compile and run integration tests
        run: docker build --target test -t trap21:test .

      - name: Build runtime image
        run: docker build --target runtime -t trap21:latest .
