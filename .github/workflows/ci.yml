name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Compile and run integration tests
        run: docker build --target test -t trap21:test .

      - name: Build runtime image
        run: docker build --target runtime -t trap21:latest .

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Smoke-test hardened runtime
        run: |
          docker compose up --build --detach
          for attempt in $(seq 1 20); do
            if curl --fail --silent --show-error --user "ftpuser:87654321" "ftp://127.0.0.1/pub/README.txt" >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 20 ]; then
              docker compose logs
              exit 1
            fi
            sleep 1
          done
          docker compose exec -T trap21 sh -c 'test "$(id -u)" -ne 0 && test -w /app/data && test "$(stat -c %a /app/data)" = 700'

      - name: Tear down Compose smoke test
        if: always()
        run: docker compose down --volumes
