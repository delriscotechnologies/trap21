name: Apply validated AppSec fix

on:
  push:
    branches:
      - agent/fix-appsec-followup

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout fix branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/fix-appsec-followup

      - name: Apply validated source snapshot
        run: |
          cat .github/fix-payload.* | base64 -d > "$RUNNER_TEMP/fix.tar.gz"
          tar -xzf "$RUNNER_TEMP/fix.tar.gz"
          rm -f src/test/java/com/delrisco/trap21/RuntimeHardeningTest.java

      - name: Compile and run tests
        run: |
          find src/main/java -name '*.java' -print | sort > main-sources.txt
          mkdir -p build/main
          javac --release 21 -encoding UTF-8 -Xlint:all -d build/main @main-sources.txt
          find src/test/java -name '*.java' -print | sort > test-sources.txt
          mkdir -p build/test
          javac --release 21 -encoding UTF-8 -Xlint:all -cp build/main -d build/test @test-sources.txt
          java -ea -cp build/main:build/test com.delrisco.trap21.Trap21IntegrationTest
          java -ea -cp build/main:build/test com.delrisco.trap21.JsonlEventLoggerRateLimitTest

      - name: Commit validated fix
        run: |
          rm -f .github/fix-payload.* .github/workflows/apply-appsec-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix AppSec boundary enforcement"
          git push origin HEAD:agent/fix-appsec-followup
